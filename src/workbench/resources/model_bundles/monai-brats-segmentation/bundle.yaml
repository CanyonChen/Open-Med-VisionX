    - NOTICE.md
task_contract:
  task: segmentation
  modality_and_channel_order: [T1ce, T1, T2, FLAIR]
  dimensionality: 3d
  input_semantics: Four co-registered MRI volumes, tensor shape Bx4xDxHxW
  spacing_orientation_intensity: RAS+, aligned 1 mm volumes; normalize each channel over nonzero voxels
  labels_and_output_semantics: Native sigmoid logits are TC, WT, ET; product adapters reorder to WT, TC, ET and threshold explicitly
  preprocessing_postprocessing: No hidden resampling; channel-wise nonzero z-score normalization; sigmoid then visible threshold; map result back with the source affine
resources:
  cpu_supported: true
  gpu_backend: PyTorch CUDA preferred with an explicit CPU fallback
  tested_ram_vram: Validated on RTX 4060 Laptop 8 GiB; patch size must be selected to fit available memory
  expected_runtime_cpu_gpu: GPU is recommended for 3D patches; CPU is supported but substantially slower and progress must remain visible
intended_use: education-and-research-only
training_domain_and_limitations: Trained on BraTS 2018 glioma MRI; not externally validated for clinical use, other diseases, scanners, or BraTS 2021 Task 1
golden_tests:
  - tests/test_bundled_models.py::test_packaged_cpu_golden_contract[monai-brats-segmentation]
