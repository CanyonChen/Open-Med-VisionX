    - LICENSE.txt
    - SOURCE_EVIDENCE.md
    - NOTICE.md
task_contract:
  task: mri-reconstruction
  modality_and_channel_order: [real, imaginary]
  dimensionality: 2d
  input_semantics: Simulated single-coil complex k-space plus a binary sampling mask, each represented as Bx2xHxW
  spacing_orientation_intensity: Image-derived simulation in normalized image coordinates; not raw scanner k-space and no physical spacing is invented
  labels_and_output_semantics: Two-channel complex reconstructed image plus an explicitly derived magnitude view
  preprocessing_postprocessing: Orthonormal FFT; two HQS data-consistency steps with the reviewed shared two-layer DnCNN; magnitude is computed only for display
resources:
  cpu_supported: true
  gpu_backend: PyTorch CUDA preferred with an explicit CPU fallback
  tested_ram_vram: Validated on RTX 4060 Laptop 8 GiB and CPU for teaching-size 2D arrays
  expected_runtime_cpu_gpu: Interactive on GPU and CPU for teaching-size arrays; elapsed time and fallback are visible
intended_use: education-and-research-only
training_domain_and_limitations: Minimal DeepInverse MRI-tour checkpoint for explaining undersampling and data consistency; not trained or validated as a clinical reconstruction system
golden_tests:
  - tests/test_bundled_models.py::test_packaged_cpu_golden_contract[deepinv-mri-modl]
