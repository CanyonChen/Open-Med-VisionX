name: OpenMedVisionX CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy and secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Reject medical data, weights, secrets, and artifacts
        run: python scripts/check_repository.py --max-file-mb 5

  base-smoke:
    name: Base-only offscreen startup (Python 3.11)
    needs: repository-policy
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install only base viewer dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[base]"
          python -m pip check
      - name: Import and construct the GUI offscreen
        run: |
          python - <<'PY'
          import importlib.util

          from PyQt5.QtWidgets import QApplication
          from dicom_viewer.app import main
          from dicom_viewer.ui import OpenMedVisionXWindow

          assert importlib.util.find_spec("onnxruntime") is None
          assert importlib.util.find_spec("torch") is None
          assert callable(main)
          application = QApplication.instance() or QApplication([])
          window = OpenMedVisionXWindow()
          window.show()
          application.processEvents()
          assert "OpenMedVisionX" in window.windowTitle()
          window.close()
          application.processEvents()
          PY

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: repository-policy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      MPLBACKEND: Agg
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install base, test, NIfTI, and ONNX dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,nifti,onnx]"
      - name: Check source style
        run: ruff check src tests scripts
      - name: Verify import and CLI target
        run: python -c "from dicom_viewer.app import main; assert callable(main)"
      - name: Run tests
        run: python -m pytest

  torchscript:
    name: Optional TorchScript runtime (Python 3.11)
    needs: repository-policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MPLBACKEND: Agg
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install the base project and minimal test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . "pytest>=8"
      - name: Install CPU-only PyTorch
        run: |
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.1"
      - name: Run the real TorchScript integration test
        run: |
          python -c "import torch; assert torch.version.cuda is None; print(torch.__version__)"
          python -m pytest -q \
            tests/test_inference_execution.py::test_tiny_torchscript_runtime_when_pytorch_is_available

  package:
    name: Build and install distributions
    needs: [repository-policy, base-smoke, test, torchscript]
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Install the wheel and smoke-test its entry point
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from PyQt5.QtWidgets import QApplication
          from dicom_viewer.app import main
          from dicom_viewer.ui import OpenMedVisionXWindow

          assert callable(main)
          application = QApplication.instance() or QApplication([])
          window = OpenMedVisionXWindow()
          assert "OpenMedVisionX" in window.windowTitle()
          window.close()
          PY
